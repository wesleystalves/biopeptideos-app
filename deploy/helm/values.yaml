frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/wesleystalves/biopeptideos-frontend
    tag: 918ea6990d27c229b63b3a306edc8b18caea5c46
    pullPolicy: Always
  service:
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/wesleystalves/biopeptideos-backend
    tag: 918ea6990d27c229b63b3a306edc8b18caea5c46
    pullPolicy: Always
  service:
    port: 3001
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    NODE_ENV: production
    PORT: "3001"
    # DATABASE_URL e JWT_SECRET vêm do Secret db-secret

ingress:
  enabled: true
  host: peptideosbio.com
  annotations:
    kubernetes.io/ingress.class: traefik

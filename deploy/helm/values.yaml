frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/wesleystalves/biopeptideos-frontend
    tag: 6f8d3c06e0e18e8ced5a553d9e54048fcd49ab05
    pullPolicy: Always
  service:
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/wesleystalves/biopeptideos-backend
    tag: bcf678b48be3af734417bfe407e30ec1df9e6e59
    pullPolicy: Always
  service:
    port: 3001
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    NODE_ENV: production
    PORT: "3001"
    # DATABASE_URL e JWT_SECRET vêm do Secret db-secret

ingress:
  enabled: true
  host: peptideosbio.com
  annotations:
    kubernetes.io/ingress.class: traefik

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;
    gzip_min_length 1000;

    # Fontes e assets externos armazenados localmente
    location /external/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Assets estáticos do bundle (JS, CSS, fontes)
    location /assets/ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Rotas estáticas com HTML pré-renderizado
    location = /library { try_files /library.html /index.html; }
    location = /finder { try_files /finder.html /index.html; }
    location = /compare { try_files /compare.html /index.html; }
    location = /protocols { try_files /protocols.html /index.html; }
    location = /learn { try_files /learn.html /index.html; }
    location = /calculator { try_files /calculator.html /index.html; }
    location = /stacks { try_files /stacks.html /index.html; }
    location = /interactions { try_files /interactions.html /index.html; }
    location = /body-map { try_files /body-map.html /index.html; }
    location = /schedule { try_files /schedule.html /index.html; }
    location = /support { try_files /support.html /index.html; }
    location = /auth { try_files /auth.html /index.html; }

    # SPA catchall — React Router trata o resto
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}

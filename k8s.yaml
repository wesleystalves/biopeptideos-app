apiVersion: v1
kind: Namespace
metadata:
  name: peptideos-clone
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: peptideos-clone
  namespace: peptideos-clone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: peptideos-clone
  template:
    metadata:
      labels:
        app: peptideos-clone
    spec:
      containers:
        - name: nginx
          image: docker.io/library/peptideos-clone:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: peptideos-clone
  namespace: peptideos-clone
spec:
  selector:
    app: peptideos-clone
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: peptideos-clone-ingress
  namespace: peptideos-clone
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: peptideos-clone.dw.aiwhatsapp.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: peptideos-clone
                port:
                  number: 80
  tls:
    - hosts:
        - peptideos-clone.dw.aiwhatsapp.com.br
      secretName: peptideos-clone-tls

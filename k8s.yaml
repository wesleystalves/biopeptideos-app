---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: biopeptidios

---
# Frontend (clone base — será substituído pelo Next.js novo)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: biopeptidios-web
  namespace: biopeptidios
spec:
  replicas: 1
  selector:
    matchLabels:
      app: biopeptidios-web
  template:
    metadata:
      labels:
        app: biopeptidios-web
    spec:
      containers:
        - name: web
          image: peptideos-clone:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: biopeptidios-web
  namespace: biopeptidios
spec:
  selector:
    app: biopeptidios-web
  ports:
    - port: 80
      targetPort: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: biopeptidios-ingress
  namespace: biopeptidios
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: biopeptidios.dev.aiwhatsapp.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: biopeptidios-web
                port:
                  number: 80

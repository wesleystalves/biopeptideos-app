---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: biopeptidios-api-ingress
  namespace: biopeptidios
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: "letsencrypt-cloudflare"
spec:
  ingressClassName: traefik
  rules:
    - host: api.biopeptidios.dw.aiwhatsapp.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: biopeptidios-api
                port:
                  number: 3001
  tls:
    - hosts:
        - api.biopeptidios.dw.aiwhatsapp.com.br
      secretName: biopeptidios-api-tls

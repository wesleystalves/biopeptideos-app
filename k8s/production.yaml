# ============================================================
# BioPeptideos — K8s Manifests de PRODUÇÃO
# Máquina: 170.244.65.46
# Domínios: *.peptideosbio.com
# ============================================================

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: biopeptidios

---
# ────────────────────────────────────────
# SECRETS (substituir os valores reais)
# ────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: biopeptidios-secrets
  namespace: biopeptidios
type: Opaque
stringData:
  DATABASE_URL: "postgresql://biopeptidios:CHANGE_ME@biopeptidios-postgres:5432/biopeptidios?schema=public"
  JWT_SECRET: "CHANGE_ME_strong_jwt_secret_32chars"
  RESEND_API_KEY: "re_CHANGE_ME"
  RESEND_FROM: "BioPeptideos <noreply@peptideosbio.com>"
  ASAAS_API_KEY: "CHANGE_ME_asaas_production_key"
  ASAAS_WEBHOOK_SECRET: "CHANGE_ME_webhook_secret"
  APP_URL: "https://peptideosbio.com"
  PRICE_BASIC: "9.90"
  PRICE_PREMIUM: "29.90"

---
# ────────────────────────────────────────
# REDIS
# ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: biopeptidios-redis
  namespace: biopeptidios
spec:
  replicas: 1
  selector:
    matchLabels:
      app: biopeptidios-redis
  template:
    metadata:
      labels:
        app: biopeptidios-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: biopeptidios-redis
  namespace: biopeptidios
spec:
  selector:
    app: biopeptidios-redis
  ports:
  - port: 6379
    targetPort: 6379

---
# ────────────────────────────────────────
# POSTGRES
# ────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: biopeptidios-postgres-pvc
  namespace: biopeptidios
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: biopeptidios-postgres
  namespace: biopeptidios
spec:
  replicas: 1
  selector:
    matchLabels:
      app: biopeptidios-postgres
  template:
    metadata:
      labels:
        app: biopeptidios-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: biopeptidios
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: biopeptidios-secrets
              key: DATABASE_URL
              optional: true
        - name: POSTGRES_DB
          value: biopeptidios
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: biopeptidios-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: biopeptidios-postgres
  namespace: biopeptidios
spec:
  selector:
    app: biopeptidios-postgres
  ports:
  - port: 5432
    targetPort: 5432

---
# ────────────────────────────────────────
# BACKEND (API NestJS)
# ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: biopeptidios-api
  namespace: biopeptidios
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: biopeptidios-api
  template:
    metadata:
      labels:
        app: biopeptidios-api
    spec:
      containers:
      - name: api
        image: biopeptidios-api:v11   # Atualizar tag na release
        imagePullPolicy: Never         # Mudar para IfNotPresent em registry externo
        ports:
        - containerPort: 3001
        envFrom:
        - secretRef:
            name: biopeptidios-secrets
        env:
        - name: REDIS_URL
          value: "redis://biopeptidios-redis:6379"
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: biopeptidios-api
  namespace: biopeptidios
spec:
  selector:
    app: biopeptidios-api
  ports:
  - port: 3001
    targetPort: 3001

---
# ────────────────────────────────────────
# FRONTEND (Next.js)
# ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: biopeptidios-web
  namespace: biopeptidios
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: biopeptidios-web
  template:
    metadata:
      labels:
        app: biopeptidios-web
    spec:
      containers:
      - name: web
        image: biopeptidios-web:v7    # Atualizar tag na release
        imagePullPolicy: Never         # Mudar para IfNotPresent em registry externo
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: HOSTNAME
          value: "0.0.0.0"
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.peptideosbio.com"
        - name: NEXT_PUBLIC_APP_URL
          value: "https://peptideosbio.com"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: biopeptidios-web
  namespace: biopeptidios
spec:
  selector:
    app: biopeptidios-web
  ports:
  - port: 80
    targetPort: 3000

---
# ────────────────────────────────────────
# AI SERVICE
# ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: biopeptidios-ai
  namespace: biopeptidios
spec:
  replicas: 1
  selector:
    matchLabels:
      app: biopeptidios-ai
  template:
    metadata:
      labels:
        app: biopeptidios-ai
    spec:
      containers:
      - name: ai
        image: biopeptidios-ai:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: biopeptidios-ai
  namespace: biopeptidios
spec:
  selector:
    app: biopeptidios-ai
  ports:
  - port: 8000
    targetPort: 8000

---
# ────────────────────────────────────────
# INGRESS — PRODUÇÃO
# cert-manager: letsencrypt-prod (HTTP-01)
# ────────────────────────────────────────

# Plataforma principal: peptideosbio.com
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: biopeptidios-web-ingress
  namespace: biopeptidios
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: traefik
spec:
  ingressClassName: traefik
  rules:
  - host: peptideosbio.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: biopeptidios-web
            port:
              number: 80
  - host: www.peptideosbio.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: biopeptidios-web
            port:
              number: 80
  tls:
  - hosts:
    - peptideosbio.com
    - www.peptideosbio.com
    secretName: biopeptidios-web-prod-tls

---
# API: api.peptideosbio.com
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: biopeptidios-api-ingress
  namespace: biopeptidios
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: traefik
spec:
  ingressClassName: traefik
  rules:
  - host: api.peptideosbio.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: biopeptidios-api
            port:
              number: 3001
  tls:
  - hosts:
    - api.peptideosbio.com
    secretName: biopeptidios-api-prod-tls

---
# Ebook Landing: ebook-pep.peptideosbio.com
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ebook-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: traefik
spec:
  ingressClassName: traefik
  rules:
  - host: ebook-pep.peptideosbio.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ebook-web-svc
            port:
              number: 80
  tls:
  - hosts:
    - ebook-pep.peptideosbio.com
    secretName: ebook-pep-prod-tls
